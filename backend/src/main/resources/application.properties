# 1. Configuración de la conexión a Azure SQL
spring.datasource.url=jdbc:sqlserver://TU_SERVIDOR.database.windows.net:1433;database=TU_BASE_DE_DATOS;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
spring.datasource.username=TU_USUARIO_DE_AZURE
spring.datasource.password=TU_CONTRASEÑA_DE_AZURE
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 2. Configuración de Hibernate (Para que Java cree las tablas solo)
# 'update' hará que Spring Boot cree las tablas 'Equipos', 'Tiendas', etc., basándose en tus modelos.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# 3. Puerto donde corre el Backend
server.port=8080
